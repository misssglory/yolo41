# Project configuration for YOLOv3 chess homework.
# The model input is square 416x416, matching the lesson and the chess dataset.

[image]
size = 416

[training]
# "auto" -> first try local Keras weights from runs/detect/yolov3_keras_chess*/weights
# "none" -> do not load local Keras weights
# "path/to/file.weights.h5" -> load exact Keras weights
weights = "auto"

# If no local Keras weights were loaded, initialize YOLOv3 from the original
# Darknet COCO weights from the lesson, then fine-tune on chess classes.
# Final output conv layers for 80 COCO classes are skipped because the chess
# dataset has 13 classes.
use_darknet_pretrained = true
darknet_weights = "yolov3.weights"
darknet_weights_url = "https://storage.yandexcloud.net/academy.ai/CV/yolov3.weights"

[environment]
# Dependency installer mode for notebooks/Colab helper cells.
# true  -> prefer uv if available
# false -> always use python -m pip (recommended for Google Colab)
use_uv = false

# Colab usually runs Python 3.12 and already supports stable TensorFlow.
# For Nix + Python 3.14 keep requirements.txt with tf-nightly.
# For Colab/Python 3.12 prefer requirements-colab.txt.
requirements = "requirements-colab.txt"
editable_install = true
upgrade_pip = false

[demo]
# "square"  -> only 416x416 baseline image.
# "mixed"   -> 416x416 baseline + landscape + portrait test images.
# Aliases accepted by the code: "all", "portrait_landscape", "rectangular".
orientation_mode = "square"

# How synthetic landscape/portrait images are created from the square chess dataset image.
# "center_crop" keeps proportions: resize to cover the target rectangle, then crop center.
# This avoids deformation and is better for a fair rectangular-orientation demonstration.
# "letterbox" keeps the whole image and adds padding instead of cropping.
rectangular_transform = "center_crop"

square_size = [416, 416]
landscape_size = [800, 500]
portrait_size = [500, 900]

# Notebook visualization grid. Use 16 for readable examples, 64 for larger reports.
sample_count = 16
grid_cols = 4

[labels]
# If data.yaml has correct names, leave override empty and the code will read names from data.yaml.
# This list is here as a safety net for the lesson chess_yolo dataset and notebooks.
use_default_chess_names_if_nc_13 = true
class_names_override = []
