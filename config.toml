# Project configuration for YOLOv3 chess homework.
# The model input is square 416x416, matching the lesson and the chess dataset.

[image]
size = 416

[training]
# "auto" -> first try local Keras weights from runs/detect/yolov3_keras_chess*/weights
# "none" -> do not load local Keras weights
# "path/to/file.weights.h5" -> load exact Keras weights
weights = "auto"

# If no local Keras weights were loaded, initialize YOLOv3 from the original
# Darknet COCO weights from the lesson, then fine-tune on chess classes.
# Final output conv layers for 80 COCO classes are skipped because the chess
# dataset has 13 classes.
use_darknet_pretrained = true
darknet_weights = "yolov3.weights"
darknet_weights_url = "https://storage.yandexcloud.net/academy.ai/CV/yolov3.weights"
# Safe defaults. Do not use large LR: YOLOv3 decodes width/height with exp(tw/th),
# so oversized updates can collapse predictions to full-image boxes with score 1.0.
learning_rate = 0.00001
clipnorm = 1.0
freeze_darknet_epochs = 3
fine_tune_learning_rate = 0.000003

[environment]
# Dependency installer backend for notebooks/helpers:
# "auto" -> real Colab uses pip; local/Nix uses uv if available.
# "pip"  -> prefer python -m pip. If local Python has no pip and uv exists, fallback to uv.
# "uv"   -> use uv pip install.
# "none" -> do not install anything.
install_backend = "auto"

# Legacy option kept for compatibility. Prefer install_backend above.
# true  -> prefer uv
# false -> prefer pip
use_uv = false

# Colab usually already has TensorFlow. requirements-colab.txt intentionally
# does not include tensorflow; skip_tensorflow_on_colab is a second safety net.
requirements = "requirements-colab.txt"
editable_install = true
upgrade_pip = false
skip_tensorflow_on_colab = true
editable_no_deps_on_colab = true

[demo]
# "square"  -> only 416x416 baseline image.
# "mixed"   -> 416x416 baseline + landscape + portrait test images.
# Default is mixed because the homework asks to demonstrate horizontal and vertical orientations.
# Aliases accepted by the code: "all", "portrait_landscape", "rectangular".
orientation_mode = "mixed"

# How synthetic landscape/portrait images are created from the square chess dataset image.
# "center_crop" keeps proportions: resize to cover the target rectangle, then crop center.
# This avoids deformation and is better for a fair rectangular-orientation demonstration.
# "letterbox" keeps the whole image and adds padding instead of cropping.
# For this square dataset use moderate 4:3 / 3:4 rectangles; very extreme crops cut away many chess pieces.
rectangular_transform = "center_crop"

square_size = [416, 416]
landscape_size = [640, 480]
portrait_size = [480, 640]

# Notebook visualization grid. Use 16 for readable examples, 64 for larger reports.
sample_count = 16
grid_cols = 4

[labels]

# Label format in .txt files.
# Diagnostic result for this chess dataset:
#   each row has 9 values: class_id x1 y1 x2 y2 x3 y3 x4 y4
#   so labels are 4-point polygons / quadrilaterals, normalized to 0..1.
# For YOLOv3 detection training the loader converts each polygon to bbox:
#   bbox = [min(xs), min(ys), max(xs), max(ys)].
#
# Supported values:
#   "polygon_normalized" -> class x1 y1 x2 y2 x3 y3 x4 y4
#   "xyxy_normalized"    -> class x1 y1 x2 y2
#   "yolo_xywh"          -> class x_center y_center width height
box_format = "polygon_normalized"
# If data.yaml has correct names, leave override empty and the code will read names from data.yaml.
# This list is here as a safety net for the lesson chess_yolo dataset and notebooks.
use_default_chess_names_if_nc_13 = true
class_names_override = []
# To force the exact lesson mapping, uncomment the block below:
# class_names_override = [
#   "слон",
#   "черный слон",
#   "черный король",
#   "черный конь",
#   "черная пешка",
#   "черный ферзь",
#   "черная ладья",
#   "белый слон",
#   "белый король",
#   "белый конь",
#   "белая пешка",
#   "белый ферзь",
#   "белая ладья",
# ]

[multi_crop_voting]
# Multi-crop / TTA inference for one original image.
# It runs the model on overlapping square crops, restores every box to original coordinates,
# clusters same-class boxes by IoU, then uses voting + weighted box fusion.

# 1.0 = full square window; smaller values are zoomed crops.
crop_fractions = [1.0, 0.92, 0.84, 0.76]

# center_and_cardinal -> center + left/right/up/down for every fraction.
# grid3               -> 3x3 grid for every fraction, stronger but slower.
# center              -> only centered crops.
offset_mode = "center_and_cardinal"

# Low threshold is intentional: weak single detections may become reliable if repeated.
base_conf = 0.12

# IoU threshold for grouping detections of the same class into one object.
fusion_iou = 0.35

# Filter fused clusters.
min_votes = 1
min_final_score = 0.18

# eligible = votes / crops that covered the fused box center.
# total    = votes / all crops.
support_denominator = "eligible"

# final_score = score_weight * mean_score + support_weight * support_ratio
score_weight = 0.55
support_weight = 0.45

# Transparent drawing range. final_score controls alpha.
alpha_min = 0.18
alpha_max = 0.85

# Debug: draw all crop windows over final prediction.
draw_crop_windows = false
